<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Angel One project placeholder</title>
  <desc id="desc">A cool grey editorial grid with an orange marker and project label.</desc>
  <defs>
    <pattern id="grid" width="200" height="150" patternUnits="userSpaceOnUse">
      <path d="M 200 0 L 0 0 0 150" fill="none" stroke="#aab2b7" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="1600" height="900" fill="#d8dde0"/>

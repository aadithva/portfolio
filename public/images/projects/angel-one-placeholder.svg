  <rect x="160" y="218" width="14" height="14" fill="#ed5b2a"/>
  <text x="160" y="340" fill="#1f2224" font-family="IBM Plex Mono, monospace" font-size="82" font-weight="500">ANGEL ONE</text>
  <text x="160" y="410" fill="#687177" font-family="IBM Plex Mono, monospace" font-size="24" letter-spacing="3">FINTECH / PRODUCT DESIGN</text>
  <line x1="160" y1="540" x2="1440" y2="540" stroke="#1f2224" stroke-width="2"/>
  <text x="160" y="605" fill="#687177" font-family="IBM Plex Mono, monospace" font-size="20" letter-spacing="2">PUBLIC CASE STUDY / VISUALS TO FOLLOW</text>
